<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physical Activity Assessment</title>
    <style>
        :root {
            --teal: #01aef0;
            --dark-bg: #333333;
            --light-bg: #f4f4f4;
            --border-color: #dddddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background-color: #ffffff;
            color: #333;
        }

        .container {
            max-width: 1100px;
            margin: 20px auto;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }

        header { padding: 20px 40px; text-align: center; }
        header h1 { font-weight: 400; margin: 0; font-size: 2.2rem; }

        #input-section {
            background-color: var(--dark-bg);
            padding: 40px;
            color: white;
        }

        .input-grid {
            display: flex; justify-content: space-around;
            flex-wrap: wrap; gap: 30px; margin-bottom: 30px;
        }

        .input-box { display: flex; align-items: center; max-width: 400px; }
        .q-num { color: var(--teal); font-weight: bold; font-size: 1.1rem; margin-right: 10px; }
        .q-text { font-size: 0.95rem; line-height: 1.4; margin-right: 15px; color: #eeeeee; }

        input[type="number"] {
            width: 60px; height: 40px; font-size: 1.2rem;
            text-align: center; border: none; border-radius: 2px;
        }

        .btn-main {
            background-color: var(--teal);
            color: white; border: none; padding: 12px 40px;
            font-weight: bold; font-size: 1rem; cursor: pointer;
        }

        #results-section {
            display: none; background-color: var(--light-bg);
            padding: 40px; animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .results-flex { display: flex; gap: 40px; align-items: flex-start; }
        .feedback-column { flex: 1; display: flex; gap: 20px; }
        .traffic-light-box {
            width: 50px; height: 130px; background-color: #222;
            border-radius: 8px; display: flex; flex-direction: column;
            align-items: center; justify-content: space-around; padding: 10px 0;
        }

        .light { width: 32px; height: 32px; border-radius: 50%; background-color: #444; }
        .light.red.active { background-color: #ff3c3c; box-shadow: 0 0 15px #ff3c3c; }
        .light.yellow.active { background-color: #ffca28; box-shadow: 0 0 15px #ffca28; }
        .light.green.active { background-color: #22cb5c; box-shadow: 0 0 15px #22cb5c; }

        .graph-column {
            flex: 1.5; background: white; padding: 20px;
            border-radius: 4px; border: 1px solid #eee;
        }

        svg { width: 100%; height: auto; }
        .btn-restart { margin-top: 30px; background-color: var(--teal); color: white; border: none; padding: 10px 25px; cursor: pointer; font-weight: bold; }

        @media (max-width: 768px) { .results-flex { flex-direction: column; } }
    </style>
</head>
<body>

<div class="container">
    <header><h1>Physical Activity Assessment</h1></header>

    <div id="input-section">
        <div class="input-grid">
            <div class="input-box">
                <span class="q-num">Q1</span>
                <span class="q-text">Average days per week of moderate activity?</span>
                <input type="number" id="days" value="5" min="0" max="7">
            </div>
            <div class="input-box">
                <span class="q-num">Q2</span>
                <span class="q-text">Average minutes per session?</span>
                <input type="number" id="mins" value="30" min="0">
            </div>
        </div>
        <div style="text-align: center;"><button class="btn-main" onclick="calculate()">GET RESULTS</button></div>
    </div>

    <div id="results-section">
        <div class="results-flex">
            <div class="feedback-column">
                <div class="traffic-light-box">
                    <div id="l-red" class="light red"></div>
                    <div id="l-yellow" class="light yellow"></div>
                    <div id="l-green" class="light green"></div>
                </div>
                <div class="feedback-text-box">
                    <h3 id="status-title"></h3>
                    <p id="status-desc"></p>
                </div>
            </div>

            <div class="graph-column">
                <svg viewBox="0 0 450 300">
                    <polygon id="zone-red" points="" fill="#ff5e7e" />
                    <polygon id="zone-yellow" points="" fill="#ffc107" />
                    <polygon id="zone-green" points="" fill="#28a745" />

                    <line x1="50" y1="20" x2="50" y2="250" stroke="#333" stroke-width="1.5" />
                    <line x1="50" y1="250" x2="420" y2="250" stroke="#333" stroke-width="1.5" />

                    <text x="50" y="270" font-size="10" text-anchor="middle">0</text>
                    <text x="87" y="270" font-size="10" text-anchor="middle">30</text>
                    <text x="124" y="270" font-size="10" text-anchor="middle">60</text>
                    <text x="235" y="270" font-size="10" text-anchor="middle">150</text>
                    <text x="420" y="270" font-size="10" text-anchor="middle">300</text>
                    <text x="235" y="295" font-size="11" font-weight="bold" text-anchor="middle">MINUTES PER WEEK</text>
                    
                    <text x="45" y="25" font-size="10" text-anchor="end">Higher: 1</text>
                    <text x="45" y="245" font-size="10" text-anchor="end">Lower: 0.77</text>
                    <text x="25" y="135" font-size="11" font-weight="bold" transform="rotate(-90 25,135)" text-anchor="middle">RELATIVE RISK</text>

                    <g id="user-marker" style="visibility: hidden;">
                        <line id="user-line" x1="0" y1="0" x2="0" y2="250" stroke="black" stroke-width="1.5" stroke-dasharray="3" />
                        <circle id="user-dot" cx="0" cy="0" r="5" fill="black" />
                        <text id="user-tag" x="0" y="0" font-weight="bold" text-anchor="middle" font-size="12">YOU</text>
                    </g>
                </svg>
            </div>
        </div>
        <button class="btn-restart" onclick="location.reload()">START AGAIN</button>
    </div>
</div>

<script>
    function calculate() {
        const d = parseInt(document.getElementById('days').value) || 0;
        const m = parseInt(document.getElementById('mins').value) || 0;
        const totalRaw = d * m;
        const total = Math.min(totalRaw, 300);

        document.getElementById('input-section').style.display = 'none';
        document.getElementById('results-section').style.display = 'block';

        // Traffic Lights
        document.querySelectorAll('.light').forEach(l => l.classList.remove('active'));
        const title = document.getElementById('status-title');
        const desc = document.getElementById('status-desc');

        if (totalRaw >= 150) {
            document.getElementById('l-green').classList.add('active');
            title.innerText = "Active. Well done.";
            desc.innerText = "Maintaining this level of activity is really important.";
        } else if (totalRaw >= 30) {
            document.getElementById('l-yellow').classList.add('active');
            title.innerText = "Keep it up.";
            desc.innerText = "You're making progress. Try to reach 150 minutes for full benefits.";
        } else {
            document.getElementById('l-red').classList.add('active');
            title.innerText = "Start Small.";
            desc.innerText = "Just 30 minutes of activity a week can make a huge difference.";
        }

        // --- FORMULA AND GRAPH LOGIC ---
        const k = 0.0213; // Your requested constant
        const xMin = 50, xMax = 420;
        const yTop = 20, yBottom = 250;
        const minScale = 300;

        // Map Minutes to RR based on the formula, then map RR to pixels
        function getRR(mins) { return Math.exp(-k * Math.sqrt(mins)); }
        function toX(mins) { return xMin + (mins / minScale) * (xMax - xMin); }
        function toY(mins) { 
            const rr = getRR(mins);
            // Map RR 1.0 -> yTop(20) and RR 0.77 -> yBottom(250)
            return yTop + ((1 - rr) / (1 - 0.77)) * (yBottom - yTop);
        }

        // Define the Sharp Breakpoints (from your design)
        const breakpoints = [0, 30, 60, 150, 300];
        const pts = breakpoints.map(m => ({x: toX(m), y: toY(m)}));

        // Build Sharp Polygons
        function buildPolygon(startIdx, endIdx) {
            let poly = "";
            for(let i=startIdx; i<=endIdx; i++) poly += `${pts[i].x},${pts[i].y} `;
            poly += `${pts[endIdx].x},${yBottom} ${pts[startIdx].x},${yBottom}`;
            return poly;
        }

        document.getElementById('zone-red').setAttribute('points', buildPolygon(0, 1));
        document.getElementById('zone-yellow').setAttribute('points', buildPolygon(1, 3));
        document.getElementById('zone-green').setAttribute('points', buildPolygon(3, 4));

        // --- USER STICK LOGIC ---
        // To make it "stick" to the sharp visual line, we interpolate between breakpoints
        let userY;
        const ux = toX(total);
        
        // Find which segment the user's time falls into for visual alignment
        for (let i = 0; i < breakpoints.length - 1; i++) {
            if (total >= breakpoints[i] && total <= breakpoints[i+1]) {
                const t = (total - breakpoints[i]) / (breakpoints[i+1] - breakpoints[i]);
                userY = pts[i].y + t * (pts[i+1].y - pts[i].y);
                break;
            }
        }

        const marker = document.getElementById('user-marker');
        marker.style.visibility = 'visible';
        document.getElementById('user-dot').setAttribute('cx', ux);
        document.getElementById('user-dot').setAttribute('cy', userY);
        document.getElementById('user-line').setAttribute('x1', ux);
        document.getElementById('user-line').setAttribute('x2', ux);
        document.getElementById('user-line').setAttribute('y1', userY);
        document.getElementById('user-tag').setAttribute('x', ux);
        document.getElementById('user-tag').setAttribute('y', userY - 15);
    }
</script>
</body>
</html>
