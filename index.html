<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physical Activity Assessment</title>
    <style>
        :root {
            --teal: #01aef0;
            --dark-bg: #333333;
            --light-bg: #f4f4f4;
            --border-color: #dddddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333;
        }

        .container {
            max-width: 1100px;
            margin: 20px auto;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }

        header {
            padding: 20px 40px;
        }

        header h1 {
            font-weight: 400;
            margin: 0;
            font-size: 2.2rem;
        }

        #input-section {
            background-color: var(--dark-bg);
            padding: 40px;
            color: white;
        }

        .input-grid {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 30px;
        }

        .input-box {
            display: flex;
            align-items: center;
            max-width: 400px;
        }

        .q-num {
            color: var(--teal);
            font-weight: bold;
            font-size: 1.1rem;
            margin-right: 10px;
        }

        .q-text {
            font-size: 0.95rem;
            line-height: 1.4;
            margin-right: 15px;
            color: #eeeeee;
        }

        input[type="number"] {
            width: 50px;
            height: 40px;
            font-size: 1.2rem;
            text-align: center;
            border: none;
            border-radius: 2px;
            margin-right: 8px;
        }

        .btn-main {
            background-color: var(--teal);
            color: white;
            border: none;
            padding: 12px 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        #results-section {
            display: none;
            background-color: var(--light-bg);
            padding: 40px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .results-flex {
            display: flex;
            flex-direction: row;
            gap: 40px;
            align-items: flex-start;
        }

        .feedback-column {
            flex: 1;
            display: flex;
            gap: 20px;
        }

        .traffic-light-box {
            width: 50px;
            height: 130px;
            background-color: #222;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 10px 0;
            flex-shrink: 0;
        }

        .light {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #444;
        }

        .light.red.active { background-color: #ff3c3c; box-shadow: 0 0 15px #ff3c3c; }
        .light.yellow.active { background-color: #ffca28; box-shadow: 0 0 15px #ffca28; }
        .light.green.active { background-color: #22cb5c; box-shadow: 0 0 15px #22cb5c; }

        .graph-column {
            flex: 1.5;
            background: white;
            padding: 20px;
            border-radius: 4px;
            border: 1px solid #eee;
        }

        svg {
            width: 100%;
            height: auto;
        }

        .btn-restart {
            margin-top: 30px;
            background-color: var(--teal);
            color: white;
            border: none;
            padding: 10px 25px;
            cursor: pointer;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .results-flex { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 style="text-align: center;">Physical Activity Assessment - Activity Calculator</h1>
    </header>

    <div id="input-section">
        <div class="input-grid">
            <div class="input-box">
                <span class="q-num">Q1</span>
                <span class="q-text">On average, how many days each week do you do moderate or greater physical activity?</span>
                <input type="number" id="days" value="5" min="0" max="7">
            </div>
            <div class="input-box">
                <span class="q-num">Q2</span>
                <span class="q-text">On those days, on average how many minutes do you do this physical activity for?</span>
                <input type="number" id="mins" value="30" min="0">
            </div>
        </div>
        <div class="btn-container" style="text-align: center;">
            <button class="btn-main" onclick="calculate()">GET RESULTS</button>
        </div>
    </div>

    <div id="results-section">
        <div class="results-flex">
            <div class="feedback-column">
                <div class="traffic-light-box">
                    <div id="l-red" class="light red"></div>
                    <div id="l-yellow" class="light yellow"></div>
                    <div id="l-green" class="light green"></div>
                </div>
                <div class="feedback-text-box">
                    <h3 id="status-title"></h3>
                    <p id="status-desc"></p>
                </div>
            </div>

            <div class="graph-column">
                <svg viewBox="0 0 450 300">
                    <path d="M 50,20 L 90,180 L 90,250 L 50,250 Z" fill="#ff7f7f" />
                    <path d="M 90,180 L 250,250 L 90,250 Z" fill="#ffca28" />
                    <path d="M 250,250 L 420,250 L 420,245 Z" fill="#22cb5c" />
                    
                    <path d="M 50,20 C 80,180 150,240 420,250" fill="none" stroke="black" stroke-width="2" />

                    <line x1="50" y1="20" x2="50" y2="250" stroke="#333" stroke-width="1" />
                    <line x1="50" y1="250" x2="420" y2="250" stroke="#333" stroke-width="1" />

                    <text x="50" y="270" font-size="10" text-anchor="middle">0</text>
                    <text x="90" y="270" font-size="10" text-anchor="middle">30</text>
                    <text x="130" y="270" font-size="10" text-anchor="middle">60</text>
                    <text x="250" y="270" font-size="10" text-anchor="middle">150</text>
                    <text x="420" y="270" font-size="10" text-anchor="middle">300</text>
                    <text x="235" y="295" font-size="11" font-weight="bold" text-anchor="middle">MINUTES PER WEEK</text>
                    <text x="45" y="25" font-size="10" text-anchor="end">Higher: 1</text>
                    <text x="45" y="245" font-size="10" text-anchor="end">Lower: 0.77</text>

                    <g id="user-marker" style="visibility: hidden;">
                        <line id="user-line" x1="0" y1="0" x2="0" y2="250" stroke="black" stroke-dasharray="4" />
                        <circle id="user-dot" cx="0" cy="0" r="5" fill="black" />
                        <text id="user-tag" x="0" y="0" font-weight="bold" text-anchor="middle">YOU</text>
                    </g>
                </svg>
            </div>
        </div>
        <button class="btn-restart" onclick="location.reload()">START AGAIN</button>
    </div>
</div>

<script>
    function calculate() {
        const d = parseInt(document.getElementById('days').value) || 0;
        const m = parseInt(document.getElementById('mins').value) || 0;
        const totalRaw = d * m;
        const total = Math.min(totalRaw, 300); // For graph scale only

        // 1. Show Results Page
        document.getElementById('input-section').style.display = 'none';
        document.getElementById('results-section').style.display = 'block';

        // 2. Traffic Light & Feedback
        document.querySelectorAll('.light').forEach(l => l.classList.remove('active'));
        const title = document.getElementById('status-title');
        const desc = document.getElementById('status-desc');

        if (totalRaw >= 150) {
            document.getElementById('l-green').classList.add('active');
            title.innerText = "Active. Well done.";
            desc.innerText = "Maintaining this level of activity is really important.";
        } else if (totalRaw >= 30) {
            document.getElementById('l-yellow').classList.add('active');
            title.innerText = "Keep it up.";
            desc.innerText = "You're making progress. Try to reach 150 minutes for full benefits.";
        } else {
            document.getElementById('l-red').classList.add('active');
            title.innerText = "Start Small.";
            desc.innerText = "Just 30 minutes of physical activity a week can make a huge difference.";
        }

        // 3. YOUR FORMULA: RR = e^(-0.0213 * sqrt(minutes))
const k = -Math.log(0.77) / Math.sqrt(300);
const rr = Math.exp(-k * Math.sqrt(total));
        
        // 4. MAPPING TO SVG PIXELS
        // X-axis: 0-300 mins maps to 50-420 pixels
        let xPos = 50 + (total / 300) * (420 - 50);
        // Y-axis: RR 1.0-0.77 maps to 20-250 pixels
        let yPos = 20 + ((1 - rr) / (1 - 0.77)) * (250 - 20);

        // 5. UPDATE MARKER (The "Stick")
        const marker = document.getElementById('user-marker');
        marker.style.visibility = 'visible';

        document.getElementById('user-dot').setAttribute('cx', xPos);
        document.getElementById('user-dot').setAttribute('cy', yPos);

        document.getElementById('user-line').setAttribute('x1', xPos);
        document.getElementById('user-line').setAttribute('x2', xPos);
        document.getElementById('user-line').setAttribute('y1', yPos);
        document.getElementById('user-line').setAttribute('y2', 250);

        const tag = document.getElementById('user-tag');
        tag.setAttribute('x', xPos);
        tag.setAttribute('y', yPos - 15);
    }
</script>

</body>
</html>
