<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physical Activity Assessment</title>

<style>
    :root{
        --teal:#01aef0;
        --dark-bg:#333333;
        --light-bg:#f4f4f4;
        --border-color:#dddddd;
    }

    *{
        box-sizing:border-box;
    }

    body{
        font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
        margin:0;
        padding:0;
        background:#ffffff;
        color:#333;
    }

    .container{
        max-width:1200px;
        margin:20px auto;
        border:1px solid var(--border-color);
        box-shadow:0 2px 15px rgba(0,0,0,0.05);
    }

    header{
        padding:20px 40px;
    }

    header h1{
        margin:0;
        text-align:center;
        font-size:2rem;
        font-weight:400;
    }

    #input-section{
        background:var(--dark-bg);
        padding:40px;
        color:white;
    }

    .input-grid{
        display:flex;
        gap:30px;
        justify-content:space-around;
        flex-wrap:wrap;
        margin-bottom:30px;
    }

    .input-box{
        display:flex;
        align-items:center;
        max-width:420px;
    }

    .q-num{
        color:var(--teal);
        font-weight:bold;
        margin-right:10px;
    }

    .q-text{
        margin-right:15px;
        line-height:1.4;
        font-size:0.95rem;
        color:#eee;
    }

    input[type="number"]{
        width:60px;
        height:42px;
        border:none;
        border-radius:2px;
        text-align:center;
        font-size:1.1rem;
    }

    .btn-main{
        background:var(--teal);
        color:white;
        border:none;
        padding:14px 40px;
        font-weight:bold;
        cursor:pointer;
        font-size:1rem;
    }

    #results-section{
        display:none;
        background:var(--light-bg);
        padding:40px;
    }

    .results-flex{
        display:flex;
        gap:40px;
        align-items:flex-start;
    }

    .feedback-column{
        flex:1;
        display:flex;
        gap:20px;
    }

    .traffic-light-box{
        width:58px;
        height:150px;
        background:#222;
        border-radius:10px;
        display:flex;
        flex-direction:column;
        justify-content:space-around;
        align-items:center;
        padding:10px 0;
        flex-shrink:0;
    }

    .light{
        width:34px;
        height:34px;
        border-radius:50%;
        background:#444;
    }

    .light.red.active{
        background:#ff4f7b;
        box-shadow:0 0 15px #ff4f7b;
    }

    .light.yellow.active{
        background:#f7c400;
        box-shadow:0 0 15px #f7c400;
    }

    .light.green.active{
        background:#32c266;
        box-shadow:0 0 15px #32c266;
    }

    .feedback-text-box h3{
        margin-top:0;
        font-size:2rem;
        font-weight:700;
    }

    .feedback-text-box p{
        font-size:1.1rem;
        line-height:1.5;
        max-width:300px;
    }

    .graph-column{
        flex:1.5;
        padding:10px;
    }

    svg{
        width:100%;
        height:auto;
    }

    .btn-restart{
        margin-top:40px;
        background:var(--teal);
        color:white;
        border:none;
        padding:16px 40px;
        font-weight:bold;
        font-size:1.5rem;
        cursor:pointer;
    }

    @media(max-width:768px){

        .results-flex{
            flex-direction:column;
        }

    }
</style>
</head>

<body>

<div class="container">

    <header>
        <h1>Physical Activity Assessment - Activity Calculator</h1>
    </header>

    <div id="input-section">

        <div class="input-grid">

            <div class="input-box">
                <span class="q-num">Q1</span>

                <span class="q-text">
                    On average, how many days each week do you do moderate or greater physical activity?
                </span>

                <input type="number" id="days" value="5" min="0" max="7">
            </div>

            <div class="input-box">
                <span class="q-num">Q2</span>

                <span class="q-text">
                    On those days, on average how many minutes do you do this physical activity for?
                </span>

                <input type="number" id="mins" value="30" min="0">
            </div>

        </div>

        <div style="text-align:center;">
            <button class="btn-main" onclick="calculate()">
                GET RESULTS
            </button>
        </div>

    </div>

    <div id="results-section">

        <div class="results-flex">

            <div class="feedback-column">

                <div class="traffic-light-box">
                    <div id="l-red" class="light red"></div>
                    <div id="l-yellow" class="light yellow"></div>
                    <div id="l-green" class="light green"></div>
                </div>

                <div class="feedback-text-box">
                    <h3 id="status-title"></h3>
                    <p id="status-desc"></p>
                </div>

            </div>

            <div class="graph-column">

                <svg viewBox="0 0 520 320">

                    <!-- COLORED ZONES -->
                    <polygon id="zone-red" points="" fill="#ff4f7b"/>
                    <polygon id="zone-yellow" points="" fill="#f7c400"/>
                    <polygon id="zone-green" points="" fill="#32c266"/>

                    <!-- AXES -->
                    <line x1="70" y1="20" x2="70" y2="260"
                          stroke="#222" stroke-width="2"/>

                    <line x1="70" y1="260" x2="470" y2="260"
                          stroke="#222" stroke-width="2"/>

                    <!-- LABELS -->
                    <text x="70" y="285" font-size="12" text-anchor="middle">0</text>
                    <text x="110" y="285" font-size="12" text-anchor="middle">30</text>
                    <text x="150" y="285" font-size="12" text-anchor="middle">60</text>
                    <text x="270" y="285" font-size="12" text-anchor="middle">150</text>
                    <text x="470" y="285" font-size="12" text-anchor="middle">300</text>

                    <text x="270" y="310"
                          font-size="14"
                          font-weight="bold"
                          text-anchor="middle">
                        MINUTES PER WEEK
                    </text>

                    <text x="52" y="28"
                          font-size="12"
                          text-anchor="end">
                        Higher:
                    </text>

                    <text x="52" y="42"
                          font-size="12"
                          text-anchor="end">
                        1
                    </text>

                    <text x="52" y="252"
                          font-size="12"
                          text-anchor="end">
                        Lower:
                    </text>

                    <text x="52" y="266"
                          font-size="12"
                          text-anchor="end">
                        0.77
                    </text>

                    <text x="18"
                          y="150"
                          transform="rotate(-90 18 150)"
                          font-size="14"
                          font-weight="bold"
                          text-anchor="middle">
                        RELATIVE
                    </text>

                    <text x="34"
                          y="150"
                          transform="rotate(-90 34 150)"
                          font-size="14"
                          font-weight="bold"
                          text-anchor="middle">
                        RISK
                    </text>

                    <!-- USER MARKER -->
                    <g id="user-marker" style="visibility:hidden">

                        <line id="user-line"
                              x1="0"
                              y1="0"
                              x2="0"
                              y2="260"
                              stroke="#444"
                              stroke-width="2"
                              stroke-dasharray="4"/>

                        <circle id="user-dot"
                                cx="0"
                                cy="0"
                                r="5"
                                fill="#222"/>

                        <text id="user-tag"
                              x="0"
                              y="0"
                              font-size="16"
                              font-weight="bold"
                              text-anchor="middle">
                            YOU
                        </text>

                    </g>

                </svg>

            </div>

        </div>

        <button class="btn-restart" onclick="location.reload()">
            START AGAIN
        </button>

    </div>

</div>

<script>

function calculate(){

    const d = parseInt(document.getElementById('days').value) || 0;
    const m = parseInt(document.getElementById('mins').value) || 0;

    const totalRaw = d * m;
    const total = Math.min(totalRaw,300);

    document.getElementById('input-section').style.display = 'none';
    document.getElementById('results-section').style.display = 'block';

    // RESET LIGHTS
    document.querySelectorAll('.light').forEach(light=>{
        light.classList.remove('active');
    });

    const title = document.getElementById('status-title');
    const desc = document.getElementById('status-desc');

    // STATUS LOGIC
    if(totalRaw >= 150){

        document.getElementById('l-green').classList.add('active');

        title.innerText = 'Active. Well done.';
        desc.innerText =
            'Maintaining this level of activity is really important.';

    }
    else if(totalRaw >= 30){

        document.getElementById('l-yellow').classList.add('active');

        title.innerText = 'Keep it up.';
        desc.innerText =
            'Just 30 minutes physical activity in one week can make a huge difference to health.';

    }
    else{

        document.getElementById('l-red').classList.add('active');

        title.innerText = 'Start small.';
        desc.innerText =
            'Even a small amount of activity can improve health and wellbeing.';
    }

    // GRAPH CONSTANTS
    const xMin = 70;
    const xMax = 470;

    const yTop = 20;
    const yBottom = 260;

    function toX(mins){
        return xMin + (mins / 300) * (xMax - xMin);
    }

    // SHARP ANGLED GRAPH
    function toY(mins){

        const points = [
            { x:0,   y:20 },
            { x:30,  y:95 },
            { x:60,  y:150 },
            { x:300, y:260 }
        ];

        for(let i=0;i<points.length-1;i++){

            const p1 = points[i];
            const p2 = points[i+1];

            if(mins >= p1.x && mins <= p2.x){

                const t = (mins - p1.x) / (p2.x - p1.x);

                return p1.y + t * (p2.y - p1.y);
            }
        }

        return yBottom;
    }

    // BUILD SHAPE
    function zonePolygon(from,to){

        let topPoints = [];

        for(let i=from;i<=to;i+=1){

            topPoints.push(
                `${toX(i)},${toY(i)}`
            );
        }

        const bottom =
            `${toX(to)},${yBottom} ${toX(from)},${yBottom}`;

        return topPoints.join(' ') + ' ' + bottom;
    }

    // DRAW ZONES
    document.getElementById('zone-red')
        .setAttribute('points', zonePolygon(0,30));

    document.getElementById('zone-yellow')
        .setAttribute('points', zonePolygon(30,150));

    document.getElementById('zone-green')
        .setAttribute('points', zonePolygon(150,300));

    // USER MARKER
    const ux = toX(total);
    const uy = toY(total);

    const marker = document.getElementById('user-marker');

    marker.style.visibility = 'visible';

    document.getElementById('user-dot')
        .setAttribute('cx',ux);

    document.getElementById('user-dot')
        .setAttribute('cy',uy);

    document.getElementById('user-line')
        .setAttribute('x1',ux);

    document.getElementById('user-line')
        .setAttribute('x2',ux);

    document.getElementById('user-line')
        .setAttribute('y1',0);

    document.getElementById('user-line')
        .setAttribute('y2',260);

    document.getElementById('user-tag')
        .setAttribute('x',ux);

    document.getElementById('user-tag')
        .setAttribute('y',uy - 18);
}

</script>

</body>
</html>
